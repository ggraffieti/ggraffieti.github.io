# Build settings
permalink: /blog/:year/:title/
markdown: kramdown
highlighter: pygments
plugins: [jekyll-paginate-v2]

pagination:
  enabled: true
  per_page: 3
  permalink: "/page/:num/"

comments: true

source: source
destination: _site
sass:
  sass_dir: _sass
  style: compressed # expanded

# SEO settings
title: "Gabriele Graffieti"
description: "Gabriele Graffieti personal website"
keywords: "Graffieti, Gabriele, blog, machine learning, ai, artificial intelligence, science, research"
url: https://ggraffieti.github.io
baseurl: ""

google_analytics: UA-52446115-1
repo: http://github.com/ggraffieti/ggraffieti.github.io
disqus_shortname: "nandothemes"
disqus_site_shortname: "nandothemes"

